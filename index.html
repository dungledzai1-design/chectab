<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Zalo IMEI Cookie Tool</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="min-h-screen bg-[#0a0c14] text-[#e2e8f0] flex flex-col">
        <div class="flex-1 flex items-center justify-center px-4">
            <div class="w-full max-w-sm space-y-6">
                <div class="text-center space-y-3">
                    <div class="mx-auto w-14 h-14 rounded-2xl flex items-center justify-center relative">
                        <span class="absolute left-[3px] text-[#7c8cf8] text-xl font-mono font-bold brace-left-animated">{</span>
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-github w-8 h-8 text-white github-icon-animated" aria-hidden="true">
                            <path d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"></path>
                            <path d="M9 18c-4.51 2-5-2-7-2"></path>
                        </svg>
                        <span class="absolute right-[3px] text-[#7c8cf8] text-xl font-mono font-bold brace-right-animated">}</span>
                    </div>
                    <div>
                        <h1 class="text-2xl font-bold tracking-tight">Zalo IMEI Cookie Tool</h1>
                        <p class="text-sm text-white/40 mt-1">Lấy IMEI và Cookie Zalo</p>
                    </div>
                </div>
                <div class="bg-white/[0.03] border border-white/[0.06] rounded-2xl p-5 space-y-4">
                    <div class="space-y-2">
                        <label class="text-xs text-white/50 font-medium uppercase tracking-wider flex items-center gap-1.5">
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-github w-3.5 h-3.5" aria-hidden="true">
                                <path d="M15 22v-4a4.8 4.8 0 0 0-1-3.5c3 0 6-2 6-5.5.08-1.25-.27-2.48-1-3.5.28-1.15.28-2.35 0-3.5 0 0-1 0-3 1.5-2.64-.5-5.36-.5-8 0C6 2 5 2 5 2c-.3 1.15-.3 2.35 0 3.5A5.403 5.403 0 0 0 4 9c0 3.5 3 5.5 6 5.5-.39.49-.68 1.05-.85 1.65-.17.6-.22 1.23-.15 1.85v4"></path>
                                <path d="M9 18c-4.51 2-5-2-7-2"></path>
                            </svg>
                            GitHub Token
                        </label>
                        <div class="relative">
                            <input type="password" id="githubToken" class="file:text-foreground selection:bg-primary selection:text-primary-foreground dark:bg-input/30 flex w-full min-w-0 border px-3 py-1 shadow-xs transition-[color,box-shadow] outline-none file:inline-flex file:h-7 file:border-0 file:bg-transparent file:text-sm file:font-medium disabled:pointer-events-none disabled:cursor-not-allowed disabled:opacity-50 md:text-sm focus-visible:border-ring focus-visible:ring-ring/50 focus-visible:ring-[3px] aria-invalid:ring-destructive/20 dark:aria-invalid:ring-destructive/40 aria-invalid:border-destructive font-mono bg-black/30 border-white/[0.08] focus:border-[#7c8cf8]/50 h-11 rounded-xl pr-10 text-sm placeholder:text-white/20" placeholder="ghp_xxxxxxxxxxxxxxxxxxxx" value="">
                            <button type="button" class="absolute right-3 top-1/2 -translate-y-1/2 text-white/30 hover:text-white/60 transition-colors" onclick="togglePassword()">
                                <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-eye w-4 h-4" aria-hidden="true">
                                    <path d="M2.062 12.348a1 1 0 0 1 0-.696 10.75 10.75 0 0 1 19.876 0 1 1 0 0 1 0 .696 10.75 10.75 0 0 1-19.876 0"></path>
                                    <circle cx="12" cy="12" r="3"></circle>
                                </svg>
                            </button>
                        </div>
                    </div>
                    <button onclick="handleLogin()" class="inline-flex items-center justify-center gap-2 whitespace-nowrap transition-all disabled:pointer-events-none disabled:opacity-50 [&amp;_svg]:pointer-events-none [&amp;_svg:not([class*=&#x27;size-&#x27;])]:size-4 shrink-0 [&amp;_svg]:shrink-0 outline-none focus-visible:border-ring focus-visible:ring-ring/50 focus-visible:ring-[3px] aria-invalid:ring-destructive/20 dark:aria-invalid:ring-destructive/40 aria-invalid:border-destructive px-4 py-2 has-[&gt;svg]:px-3 w-full rounded-xl bg-[#7c8cf8] hover:bg-[#8b9cf8] text-white h-11 font-medium text-sm shadow-lg shadow-[#7c8cf8]/20" id="loginBtn">
                        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-key w-4 h-4 mr-2" aria-hidden="true">
                            <path d="m15.5 7.5 2.3 2.3a1 1 0 0 0 1.4 0l2.1-2.1a1 1 0 0 0 0-1.4L19 4"></path>
                            <path d="m21 2-9.6 9.6"></path>
                            <circle cx="7.5" cy="15.5" r="5.5"></circle>
                        </svg>
                        Đăng nhập
                    </button>
                    <p class="text-[11px] text-white/25 text-center leading-relaxed">
                        Chưa có token? 
                        <button type="button" class="text-[#7c8cf8]/70 hover:text-[#7c8cf8] hover:underline inline-flex items-center gap-0.5 cursor-pointer" onclick="window.open('https://github.com/settings/tokens', '_blank')">
                            Xem hướng dẫn tạo token 
                            <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" class="lucide lucide-external-link w-2.5 h-2.5" aria-hidden="true">
                                <path d="M15 3h6v6"></path>
                                <path d="M10 14 21 3"></path>
                                <path d="M18 13v6a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2h6"></path>
                            </svg>
                        </button>
                        <br/>
                        Scope cần chọn: <code class="bg-white/5 px-1 rounded text-white/40">repo</code> + <code class="bg-white/5 px-1 rounded text-white/40">workflow</code>
                    </p>
                </div>
            </div>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
